{% extends 'login.html' %}

{% block title %}Register{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="logo-mark" style="justify-content: center; margin-bottom: 35px; gap: 12px;">
        <div class="logo-icon" style="width: 40px; height: 40px;">
            <svg viewBox="0 0 16 16" fill="none">
                <rect x="2" y="8" width="5" height="6" rx="1.5" fill="#8c64e6"/>
                <rect x="9" y="4" width="5" height="10" rx="1.5" fill="#b396f0"/>
                <path d="M4 8V5a2 2 0 014 0v1" stroke="#8c64e6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="logo-name" style="font-size: 18px;">FarMaintenance</div>
    </div>

    <h2><span>Create an Account</span></h2>

    <form action="/signup" method="POST">
        <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="name" placeholder="John" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="surname" placeholder="Smith" required>
            </div>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="name@company.com" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <div class="auth-footer">
        Already have an account? <a href="/">Log In</a>
    </div>
</div>
{% endblock %}
