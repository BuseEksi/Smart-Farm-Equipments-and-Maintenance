{% extends "login.html" %}

{% block title %}New Technician{% endblock %}
{% block topbar_title %}New Technician{% endblock %}
{% block topbar_sub %}Add a technician account{% endblock %}

{% block content %}

<div style="max-width:520px;">
  <div class="card">
    <h3 style="margin:0 0 24px;font-size:15px;color:var(--text);font-family:'Syne',sans-serif;font-weight:600;">
      Technician Account Details
    </h3>

    <form method="POST" action="/technicians/new">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="e.g. Jane" required>
      </div>

        <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="surname" placeholder="e.g. Smith" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="technician@smartfarm.com" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>
      </div>

      <div style="display:flex;gap:8px;margin-top:8px;">
        <button type="submit" class="btn btn-primary">Create Technician</button>
        <a href="/technicians" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
